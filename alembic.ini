# alembic.ini
# ──────────────────────────────────────────────────────────────────────────────
# Alembic configuration file.
#
# The `sqlalchemy.url` here is a fallback only — migrations/env.py overrides
# it at runtime with the value from pydantic Settings (which reads .env).
# This keeps secrets out of version control while still allowing
# `alembic` CLI commands to work without extra flags.

[alembic]
script_location = migrations

# Fallback DSN — overridden by env.py at runtime.
# Use the *sync* psycopg2 scheme here; env.py translates to asyncpg internally.
sqlalchemy.url = postgresql+asyncpg://nexus:nexus@localhost:5432/nexus

# Output format for auto-generated migration files
file_template = %%(rev)s_%%(slug)s

# Prepend sys.path with this path so `from api.models import Base` resolves.
prepend_sys_path = .

# Truncate long revision IDs in file names to this many chars
truncate_slug_length = 40

# Allow revision IDs with different lengths (useful when mixing manual + auto)
revision_environment = false

# ── Logging ────────────────────────────────────────────────────────────────────
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
